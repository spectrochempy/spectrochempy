# ======================================================================================
#
#       Conda environment for the experimental spectrochempy-cantera plugin.
#
#       This environment is maintained manually (not auto-generated) because
#       the cantera plugin is experimental and not part of the official extras.
#
#       To use it:
#         conda env create -f environments/environment_cantera.yml
#         conda activate scpy-cantera
#
# ======================================================================================

channel_priority: strict
channels:
    - conda-forge
    - spectrocat
    - defaults

dependencies:

    # CORE dependencies
    # -----------------
    - colorama
    - dill
    - ipython
    - jinja2
    - lazy_loader
    - matplotlib-base
    - numpy
    - pluggy
    - pint
    - pyyaml
    - requests
    - scikit-learn
    - scipy
    - tzlocal

    # CANTERA dependencies
    # --------------------

    - spectrochempy-cantera>=0.1,<0.2
