name: Release an official plugin

# This workflow prepares and releases a single official plugin.
# It bumps the plugin version, commits, pushes, creates the release tag,
# and creates a GitHub Release. The release event triggers
# publish_plugins.yml (PyPI) and build_package.yml (conda).
#
# Usage:
#   1. Run this workflow manually (workflow_dispatch).
#   2. Enter the plugin name (e.g. "spectrochempy-nmr") and version (e.g. "0.1.1").
#   3. The workflow bumps pyproject.toml, recipe.yaml, and the plugin's
#      ``__init__.py`` version string, commits, creates
#      the tag spectrochempy-nmr-v0.1.1, and opens a GitHub Release.
#   4. The release event automatically triggers the CI publish jobs.

on:
  workflow_dispatch:
    inputs:
      plugin_name:
        description: "Plugin package name (e.g. spectrochempy-nmr)"
        required: true
        type: string
      version:
        description: "Version to release (e.g. 0.1.1)"
        required: true
        type: string
      confirm_zenodo_disabled:
        description: "Confirm Zenodo GitHub integration is disabled (see maintainers/release-process.md)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release-plugin:
    name: "Release ${{ inputs.plugin_name }} v${{ inputs.version }}"
    runs-on: ubuntu-latest
    if: github.repository == 'spectrochempy/spectrochempy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: Ensure running from master
        run: |
          if [ "${{ github.ref_name }}" != "master" ]; then
            echo "::error::Plugin releases must be triggered from the master branch (current: ${{ github.ref_name }})"
            exit 1
          fi

      - name: List official plugins with changes since last tag
        run: |
          OFFICIAL_PLUGINS="spectrochempy-nmr spectrochempy-iris spectrochempy-hypercomplex spectrochempy-carroucell"

          {
            echo "## Plugin release status"
            echo ""
            echo "| Plugin | Status | Last tag |"
            echo "|--------|--------|----------|"

            for plugin in $OFFICIAL_PLUGINS; do
              plugin_dir="plugins/$plugin"

              last_tag=$(git tag --list "${plugin}-v*" | sort -V | tail -1)

              if [ ! -d "$plugin_dir" ]; then
                echo "| $plugin | ⚠️  directory missing | — |"
                continue
              fi

              if [ -z "$last_tag" ]; then
                echo "| $plugin | 🆕 no previous plugin tag | — |"
              elif git diff --quiet "$last_tag" -- "$plugin_dir/"; then
                echo "| $plugin | ✅ unchanged since last tag | \`$last_tag\` |"
              else
                echo "| $plugin | 🔶 modified since last tag | \`$last_tag\` |"
              fi
            done

            echo ""
            echo "_This information is provided to help decide which plugins may need a release._"
            echo "_The workflow will proceed with releasing **${{ inputs.plugin_name }} v${{ inputs.version }}** regardless._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check Zenodo integration is disabled
        run: |
          if [ "${{ inputs.confirm_zenodo_disabled }}" != "true" ]; then
            echo "::error::Zenodo GitHub integration must be disabled before releasing plugins."
            echo "::error::1. Go to https://zenodo.org/account/settings/github/"
            echo "::error::2. Deactivate the spectrochempy/spectrochempy repository"
            echo "::error::3. Re-run this workflow with confirm_zenodo_disabled=true"
            echo "::error::See maintainers/release-process.md for details."
            exit 1
          fi
          echo "Zenodo disabled confirmation acknowledged."

      - name: Validate plugin name
        run: |
          # Official plugins are explicitly listed. Experimental plugins should be
          # released manually and are not handled by this workflow.
          OFFICIAL_PLUGINS="spectrochempy-nmr spectrochempy-iris spectrochempy-hypercomplex spectrochempy-carroucell"
          if ! echo "$OFFICIAL_PLUGINS" | grep -qw "${{ inputs.plugin_name }}"; then
            echo "::error::${{ inputs.plugin_name }} is not in the official plugin allowlist. Experimental plugins must be released manually."
            exit 1
          fi
          plugin_dir="plugins/${{ inputs.plugin_name }}"
          if [ ! -d "$plugin_dir" ]; then
            echo "::error::Plugin directory $plugin_dir does not exist"
            exit 1
          fi
          if [ ! -f "$plugin_dir/pyproject.toml" ]; then
            echo "::error::$plugin_dir/pyproject.toml not found"
            exit 1
          fi

      - name: Bump version in pyproject.toml
        run: |
          plugin_dir="plugins/${{ inputs.plugin_name }}"
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' "$plugin_dir/pyproject.toml"
          echo "Updated $plugin_dir/pyproject.toml"
          grep "^version =" "$plugin_dir/pyproject.toml"

      - name: Bump version in recipe.yaml (if present)
        run: |
          recipe="plugins/${{ inputs.plugin_name }}/recipe.yaml"
          if [ -f "$recipe" ]; then
            python3 .github/workflows/scripts/bump_recipe_version.py "$recipe" "${{ inputs.version }}"
          else
            echo "No recipe.yaml found; skipping conda version bump"
          fi

      - name: Bump version in plugin class __init__.py
        run: |
          python3 .github/workflows/scripts/bump_plugin_init_version.py \
            "${{ inputs.plugin_name }}" "${{ inputs.version }}"

      - name: Verify all version sources are consistent
        run: |
          plugin_name="${{ inputs.plugin_name }}"
          plugin_dir="plugins/$plugin_name"
          expected="${{ inputs.version }}"

          pyproject_ver=$(grep -oP '^version = "\K[^"]+' "$plugin_dir/pyproject.toml")
          if [ "$pyproject_ver" != "$expected" ]; then
            echo "::error::pyproject.toml version mismatch: $pyproject_ver != $expected"
            exit 1
          fi

          src_dir="${plugin_dir}/src/${plugin_name//-/_}"
          init_ver=$(grep -oP '^    version = "\K[^"]+' "$src_dir/__init__.py")
          if [ "$init_ver" != "$expected" ]; then
            echo "::error::__init__.py version mismatch: $init_ver != $expected"
            exit 1
          fi

          recipe="$plugin_dir/recipe.yaml"
          if [ -f "$recipe" ]; then
            recipe_ver=$(grep -oP '^  version: "\K[^"]+' "$recipe" | head -1)
            if [ "$recipe_ver" != "$expected" ]; then
              echo "::error::recipe.yaml version mismatch: $recipe_ver != $expected"
              exit 1
            fi
          fi

          echo "All version sources match: $expected"

      - name: Configure git
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "GitHub Actions"

      - name: Commit version bump
        run: |
          plugin_name="${{ inputs.plugin_name }}"
          plugin_dir="plugins/$plugin_name"
          git add "$plugin_dir/pyproject.toml"
          src_dir="${plugin_dir}/src/${plugin_name//-/_}"
          git add "$src_dir/__init__.py"
          if [ -f "$plugin_dir/recipe.yaml" ]; then
            git add "$plugin_dir/recipe.yaml"
          fi
          git commit --no-verify -m "Bump ${{ inputs.plugin_name }} to v${{ inputs.version }}"

      - name: Rebase on latest remote branch
        run: |
          git fetch origin ${{ github.ref_name }}
          git rebase origin/${{ github.ref_name }}

      - name: Push commit to current branch
        run: git push origin HEAD:${{ github.ref_name }}

      - name: Create and push release tag
        run: |
          tag="${{ inputs.plugin_name }}-v${{ inputs.version }}"
          git tag "$tag"
          git push origin "$tag"
          echo "Created and pushed tag: $tag"

      - name: Create GitHub Release
        run: |
          tag="${{ inputs.plugin_name }}-v${{ inputs.version }}"
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.plugin_name }} v${{ inputs.version }}" \
            --notes "Release of ${{ inputs.plugin_name }} v${{ inputs.version }}." \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
