# This workflow builds and publishes SpectroChemPy packages to:
# - PyPI
# - Anaconda Cloud

name: Build and publish packages 📦

on:
  push:
    branches:
      - master
      - fix/*

  pull_request:

  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish_pypi:
    name: Build and publish distribution to PyPI
    runs-on: ubuntu-latest
    if: github.ref_name != 'fix/plugin-testpypi-publish'

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pypa/build
        run: |
          python -m pip install build --user

      - name: Build a binary wheel and a source tarball
        run: |
          python -m build --sdist --wheel --outdir dist/ .

      - name: Upload PyPI build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: pypi-package
          path: |
            dist/*.whl
            dist/*.tar.gz
          retention-days: 5

      - name: Publish package to Test PyPI
        if: github.event_name == 'push' && github.repository == 'spectrochempy/spectrochempy'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish package to PyPI
        if: github.event_name == 'release' && github.event.action == 'published' && github.repository == 'spectrochempy/spectrochempy'
        uses: pypa/gh-action-pypi-publish@release/v1

  build-and-publish_plugins_testpypi:
    name: Build and publish plugin distributions to TestPyPI
    runs-on: ubuntu-latest
    if: github.ref_name == 'fix/plugin-testpypi-publish'

    strategy:
      fail-fast: false
      matrix:
        plugin:
          - name: spectrochempy-nmr
            path: plugins/spectrochempy-nmr

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pypa/build
        run: |
          python -m pip install build --user

      - name: Build plugin source and wheel distributions
        run: |
          python -m build --sdist --wheel --outdir dist/${{ matrix.plugin.name }} ${{ matrix.plugin.path }}

      - name: Upload plugin build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: pypi-package-${{ matrix.plugin.name }}
          path: |
            dist/${{ matrix.plugin.name }}/*.whl
            dist/${{ matrix.plugin.name }}/*.tar.gz
          retention-days: 5

      - name: Publish plugin package to TestPyPI
        if: github.event_name == 'push' && github.repository == 'spectrochempy/spectrochempy'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/${{ matrix.plugin.name }}
          skip-existing: true

  build_and_publish_conda_package:
    name: Build and publish conda package to Anaconda.org
    runs-on: ubuntu-latest
    if: github.ref_name != 'fix/plugin-testpypi-publish'

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environments/environment_build.yml
          environment-name: scpy_build
          create-args: >-
            python=3.11
          cache-environment: true

      - name: Generate conda recipe
        run: |
          python3 .github/workflows/scripts/generate_conda_recipe.py
          cat recipe/meta.yaml

      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.37
        env:
          CONDA_BLD_PATH: ../output
        with:
          recipe-path: recipe/meta.yaml
          upload-artifact: false
          build-args: "-c conda-forge -c spectrocat"

      - name: Move conda build output
        run: |
          mv ../output .

      - name: Upload conda build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: conda-package
          path: |
            output/**/*.conda
            output/**/*.tar.bz2
          retention-days: 5

      - name: Upload to Anaconda.org
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          (github.event_name == 'release' || github.event_name == 'push')
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          if [ -z "${ANACONDA_API_TOKEN:-}" ]; then
            echo "::error::ANACONDA_API_TOKEN is not set. Cannot upload to Anaconda.org."
            exit 1
          fi

          upload_package() {
            local label="$1"
            local packages=(output/**/*.tar.bz2 output/**/*.conda)

            if [ ${#packages[@]} -eq 0 ]; then
              echo "::error::No conda packages found in output/"
              exit 1
            fi

            for package in "${packages[@]}"; do
              echo "Uploading $package with label: $label"
              anaconda upload --force -l "$label" "$package"
            done
          }

          if [ "${{ github.event_name }}" = "release" ]; then
            upload_package "main"
          else
            upload_package "dev"
          fi
