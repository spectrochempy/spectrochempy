# This workflow builds and publishes SpectroChemPy packages to:
# - PyPI
# - Anaconda Cloud
#
# Conda publication strategy:
#   - Core non-release builds (pushes, PRs) are uploaded to the Anaconda dev label.
#   - Core release builds are uploaded to the main (stable) label.
#   - Plugin release builds are uploaded to the main label only.
#   - Plugin dev builds use temporary next-patch .devN versions derived from
#     plugin tags, and push builds with plugin changes upload to the dev label.
#   - Plugin conda recipes should declare a bounded dependency on the core
#     package, e.g.  spectrochempy >=0.9.0.dev0,<0.10

name: Build and publish packages 📦

on:
  push:
    branches:
      - master
      - fix/*
    paths-ignore:
      - 'docs/**'

  pull_request:
    paths-ignore:
      - 'docs/**'

  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish_pypi:
    name: Build and publish distribution to PyPI
    if: >
      github.repository == 'spectrochempy/spectrochempy' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Determine core version for PyPI build
        run: |
          LATEST_CORE_TAG=$(git tag -l 'spectrochempy-v*' --sort=-v:refname | head -1)
          if [[ -z "$LATEST_CORE_TAG" ]]; then
            echo "::error::No core tag found — cannot determine core version"
            exit 1
          fi
          if [[ "${{ github.ref_name }}" == spectrochempy-v* ]]; then
            CORE_VERSION="${GITHUB_REF_NAME#spectrochempy-v}"
          else
            LATEST_CORE_VERSION="${LATEST_CORE_TAG#spectrochempy-v}"
            IFS=. read -r CORE_MAJOR CORE_MINOR CORE_PATCH <<< "$LATEST_CORE_VERSION"
            COMMITS_SINCE_CORE_TAG=$(git rev-list --count "$LATEST_CORE_TAG"..HEAD)
            CORE_VERSION="${CORE_MAJOR}.${CORE_MINOR}.$((CORE_PATCH + 1)).dev${COMMITS_SINCE_CORE_TAG}"
          fi
          echo "Using core version: $CORE_VERSION (latest core tag: $LATEST_CORE_TAG)"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$CORE_VERSION" >> "$GITHUB_ENV"

      - name: Install pypa/build
        run: |
          python -m pip install build --user

      - name: Build a binary wheel and a source tarball
        run: |
          python -m build --sdist --wheel --outdir dist/ .

      - name: Upload PyPI build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: pypi-package
          path: |
            dist/*.whl
            dist/*.tar.gz
          retention-days: 5

      - name: Publish package to Test PyPI
        if: github.event_name == 'push' && github.repository == 'spectrochempy/spectrochempy'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish package to PyPI
        if: |
          github.event_name == 'release' &&
          github.event.action == 'published' &&
          github.repository == 'spectrochempy/spectrochempy' &&
          startsWith(github.ref_name, 'spectrochempy-v')
        uses: pypa/gh-action-pypi-publish@release/v1

  build_and_publish_conda_package:
    name: Build and publish conda package to Anaconda.org
    if: >
      github.repository == 'spectrochempy/spectrochempy' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environments/environment_build.yml
          environment-name: scpy_build
          create-args: >-
            python=3.11
          cache-environment: true

      - name: Determine core version for conda build
        run: |
          LATEST_CORE_TAG=$(git tag -l 'spectrochempy-v*' --sort=-v:refname | head -1)
          if [[ -z "$LATEST_CORE_TAG" ]]; then
            echo "::error::No core tag found — cannot determine core version"
            exit 1
          fi
          if [[ "${{ github.ref_name }}" == spectrochempy-v* ]]; then
            CORE_VERSION="${GITHUB_REF_NAME#spectrochempy-v}"
          else
            LATEST_CORE_VERSION="${LATEST_CORE_TAG#spectrochempy-v}"
            IFS=. read -r CORE_MAJOR CORE_MINOR CORE_PATCH <<< "$LATEST_CORE_VERSION"
            COMMITS_SINCE_CORE_TAG=$(git rev-list --count "$LATEST_CORE_TAG"..HEAD)
            CORE_VERSION="${CORE_MAJOR}.${CORE_MINOR}.$((CORE_PATCH + 1)).dev${COMMITS_SINCE_CORE_TAG}"
          fi
          echo "Using core version: $CORE_VERSION (latest core tag: $LATEST_CORE_TAG)"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$CORE_VERSION" >> "$GITHUB_ENV"

      - name: Generate conda recipe
        run: |
          python3 .github/workflows/scripts/generate_conda_recipe.py
          cat recipe/recipe.yaml

      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.38
        env:
          CONDA_BLD_PATH: ../output
        with:
          recipe-path: recipe/recipe.yaml
          upload-artifact: false
          build-args: "-c conda-forge -c spectrocat"

      - name: Move conda build output
        run: |
          mv ../output .

      - name: Upload conda build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: conda-package
          path: |
            output/**/*.conda
            output/**/*.tar.bz2
          retention-days: 5

      - name: Upload to Anaconda.org
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'release' && startsWith(github.ref_name, 'spectrochempy-v'))
          )
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          if [ -z "${ANACONDA_API_TOKEN:-}" ]; then
            echo "::error::ANACONDA_API_TOKEN is not set. Cannot upload to Anaconda.org."
            exit 1
          fi

          upload_package() {
            local label="$1"
            local force_flag="$2"
            local packages=(output/**/*.tar.bz2 output/**/*.conda)

            if [ ${#packages[@]} -eq 0 ]; then
              echo "::error::No conda packages found in output/"
              exit 1
            fi

            for package in "${packages[@]}"; do
              echo "Uploading $package with label: $label"
              anaconda --token "$ANACONDA_API_TOKEN" whoami
              anaconda --token "$ANACONDA_API_TOKEN" show spectrocat/spectrochempy
              anaconda --token "$ANACONDA_API_TOKEN" upload $force_flag -l "$label" "$package"
            done
          }

          if [ "${{ github.event_name }}" = "release" ]; then
            # Stable label: force upload so the label is correctly set to
            # "main", even if a push build already uploaded it to "dev".
            upload_package "main" "--force"
          else
            # Dev label: allow overwrite so the latest dev build is always available.
            upload_package "dev" "--force"
          fi

  discover-conda-plugins:
    name: Discover plugins with conda recipes
    runs-on: ubuntu-latest
    needs: build_and_publish_conda_package
    if: github.repository == 'spectrochempy/spectrochempy'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set plugin matrix
        id: set-matrix
        run: |
          # Official plugins are explicitly listed. Experimental plugins may live in
          # the repository but are NOT auto-published by this workflow.
          OFFICIAL_PLUGINS="spectrochempy-nmr spectrochempy-iris spectrochempy-tensor spectrochempy-hypercomplex spectrochempy-carroucell"

          plugins=()
          for dir in plugins/*/; do
            name=$(basename "$dir")
            if [ "$name" = "plugin-template" ]; then
              echo "Skipping $name (developer template, not publishable)"
              continue
            fi
            if ! echo "$OFFICIAL_PLUGINS" | grep -qw "$name"; then
              echo "Skipping $name (not in official plugin allowlist)"
              continue
            fi
            if [ -f "${dir}recipe.yaml" ] || [ -f "${dir}meta.yaml" ]; then
              recipe_file="recipe.yaml"
              [ -f "${dir}meta.yaml" ] && recipe_file="meta.yaml"
              plugins+=("{\"name\":\"$name\",\"recipe\":\"${dir%/}\",\"recipe_file\":\"$recipe_file\"}")
            fi
          done

          if [ ${#plugins[@]} -eq 0 ]; then
            echo "No official plugins with conda recipes found. Skipping plugin builds."
            echo "matrix={}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          joined=$(IFS=,; echo "${plugins[*]}")
          echo "matrix={\"plugin\":[$joined]}" >> "$GITHUB_OUTPUT"
          echo "Discovered official conda plugins: $joined"

  build_and_publish_conda_plugins:
    name: Build and publish conda plugin packages to Anaconda.org
    runs-on: ubuntu-latest
    needs: discover-conda-plugins
    if: |
      github.repository == 'spectrochempy/spectrochempy' &&
      needs.discover-conda-plugins.outputs.matrix != '{}' &&
      needs.discover-conda-plugins.outputs.matrix != ''

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-conda-plugins.outputs.matrix) }}

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environments/environment_build.yml
          environment-name: scpy_build
          create-args: >-
            python=3.11
          cache-environment: true

      - name: Download core conda package
        uses: actions/download-artifact@v8
        with:
          name: conda-package
          path: /tmp/core-pkg

      - name: Setup local conda channel from core build
        run: |
          echo "=== Artifact structure ==="
          find /tmp/core-pkg -type f 2>/dev/null || echo "(empty)"
          echo "=== Copying to local channel ==="
          PARENT=$(dirname "${{ github.workspace }}")
          mkdir -p "$PARENT/output"
          if [ -d /tmp/core-pkg/output ]; then
            cp -r /tmp/core-pkg/output/* "$PARENT/output/"
          else
            cp -r /tmp/core-pkg/* "$PARENT/output/"
          fi
          echo "=== Local channel contents ==="
          find "$PARENT/output" -type f

      - name: Apply plugin development version
        id: plugin-version
        if: ${{ !(github.event_name == 'release' && startsWith(github.ref_name, matrix.plugin.name)) }}
        run: |
          python3 .github/workflows/scripts/plugin_version_status.py \
            --plugin "${{ matrix.plugin.name }}" \
            --apply-dev-version \
            --github-output \
            --json

      - name: Build conda plugin package
        uses: prefix-dev/rattler-build-action@v0.2.38
        env:
          CONDA_BLD_PATH: ../output
        with:
          recipe-path: ${{ matrix.plugin.recipe }}/${{ matrix.plugin.recipe_file }}
          upload-artifact: false
          # spectrocat channels come first so that spectrochempy is resolved from
          # our channel (avoiding strict channel priority exclusion by conda-forge).
          # For non-release builds, the dev label provides the latest dev core.
          build-args: >-
            -c spectrocat/label/dev
            -c spectrocat
            -c conda-forge

      - name: Move conda build output
        run: |
          mv ../output .

      - name: Upload conda build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: conda-package-${{ matrix.plugin.name }}
          path: |
            output/**/*.conda
            output/**/*.tar.bz2
          retention-days: 5

      - name: Restore plugin version metadata
        if: ${{ always() && !(github.event_name == 'release' && startsWith(github.ref_name, matrix.plugin.name)) }}
        run: |
          git restore --worktree -- "${{ matrix.plugin.recipe }}"
          git diff --exit-code -- "${{ matrix.plugin.recipe }}"

      - name: Upload plugin dev package to Anaconda.org
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          github.event_name == 'push' &&
          github.ref_name == 'master' &&
          steps.plugin-version.outputs.has_changes == 'true'
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          echo "Plugin development build detected; uploading ${{ matrix.plugin.name }} to Anaconda label: dev"
          echo "Computed development version: ${{ steps.plugin-version.outputs.dev_version }}"

          if [ -z "${ANACONDA_API_TOKEN:-}" ]; then
            echo "::error::ANACONDA_API_TOKEN is not set. Cannot upload to Anaconda.org."
            exit 1
          fi

          packages=(output/**/*.tar.bz2 output/**/*.conda)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "::error::No conda packages found in output/"
            exit 1
          fi

          for package in "${packages[@]}"; do
            basename=$(basename "$package")
            if [[ "$basename" == spectrochempy-[0-9]* ]]; then
              echo "Skipping core package (already uploaded): $package"
              continue
            fi
            echo "Uploading $package with label: dev"
            anaconda --token "$ANACONDA_API_TOKEN" upload --force -l "dev" "$package"
          done

          echo "::notice::Plugin ${{ matrix.plugin.name }} uploaded to Anaconda label: dev"

      - name: Skip plugin dev upload
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          !(github.event_name == 'release' && startsWith(github.ref_name, matrix.plugin.name)) &&
          !(github.event_name == 'push' && github.ref_name == 'master' && steps.plugin-version.outputs.has_changes == 'true')
        run: |
          echo "Skipping dev upload for plugin ${{ matrix.plugin.name }}."
          echo "Computed development version: ${{ steps.plugin-version.outputs.dev_version }}"
          echo "Upload happens only on push to master when release-relevant plugin files changed."

      - name: Upload plugin to Anaconda.org
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          github.event_name == 'release' &&
          startsWith(github.ref_name, matrix.plugin.name)
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          echo "Stable plugin release detected; uploading ${{ matrix.plugin.name }} to Anaconda label: main"

          if [ -z "${ANACONDA_API_TOKEN:-}" ]; then
            echo "::error::ANACONDA_API_TOKEN is not set. Cannot upload to Anaconda.org."
            exit 1
          fi

          packages=(output/**/*.tar.bz2 output/**/*.conda)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "::error::No conda packages found in output/"
            exit 1
          fi

          for package in "${packages[@]}"; do
            basename=$(basename "$package")
            if [[ "$basename" == spectrochempy-[0-9]* ]]; then
              echo "Skipping core package (already uploaded): $package"
              continue
            fi
            echo "Uploading $package with label: main"
            anaconda --token "$ANACONDA_API_TOKEN" upload --force -l "main" "$package"
          done

          echo "::notice::Plugin ${{ matrix.plugin.name }} uploaded to Anaconda label: main"
