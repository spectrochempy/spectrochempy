# This workflow builds and publishes the documentation for SpectrochemPy
# Documentation is built using Sphinx and published to GitHub Pages
#
# Branch preview deployment:
# - Development branches (non-master, non-docs/*, non-release) publish
#   preview docs under /<branch-name>/ on GitHub Pages.
# - Branch names are sanitised: "/" becomes "-".
# - Example: branch "plugins" → /plugins/, "feature/new-nmr" → /feature-new-nmr/
# - Stable docs at root level remain untouched.
# - Preview docs are automatically removed when the branch is deleted
#   via the cleanup workflow (cleanup_branch_docs.yml).

name: Docs 📕

on:
  push:
    branches:
      - "**"

  pull_request:

  release:
    types: [published]

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * 0"  # At 00:00 on Sunday

permissions:
  contents: write  # Required for pushing to gh-pages
  actions: read    # Default permission for actions
  id-token: none   # Explicitly disable id-token unless needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_publish_documentation:
    # Only run scheduled jobs on main repository
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy') || (
       github.event_name != 'schedule')

    name: Build and publish documentation
    runs-on: ubuntu-latest
    env:
      TZ: "Etc/UTC"

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install uv and verify installation
        run: |
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --upgrade uv
          which uv
          uv --version

      - name: Install spectrochempy
        run: |
          . .venv/bin/activate
          uv pip install -e ".[docs]"

      - name: Install SpectroChemPy plugins
        run: |
          . .venv/bin/activate
          uv pip install -e plugins/spectrochempy-nmr
          uv pip install -e plugins/spectrochempy-iris
          uv pip install -e plugins/spectrochempy-cantera

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pandoc --version

      - name: Setup Jupyter kernel
        run: |
          . .venv/bin/activate
          uv pip install ipykernel
          python3 -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Set up version environment variable
        run: |
          . .venv/bin/activate
          python3 .github/workflows/scripts/set_env_var.py

      # ---------- preview / stable branch detection ----------
      - name: Determine preview parameters
        id: preview
        run: |
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          # Stable builds: master, docs/* branches, and release events
          if [[ "$BRANCH" == "master" || "$BRANCH" == docs/* || "$EVENT" == "release" ]]; then
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
            echo "preview_path=" >> "$GITHUB_OUTPUT"
            echo "build_subdir=" >> "$GITHUB_OUTPUT"
          else
            SANITIZED=$(echo "$BRANCH" | tr '/' '-')
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
            echo "preview_path=$SANITIZED" >> "$GITHUB_OUTPUT"
            echo "build_subdir=build/branch_preview" >> "$GITHUB_OUTPUT"
          fi

      # ---------- clone gh-pages (preserve existing content) ----------
      - name: Clone gh-pages branch
        run: |
          mkdir -p build
          git clone --branch=gh-pages --single-branch \
            https://github.com/${{ github.repository }}.git build/html

      # ---------- build docs ----------
      - name: Build docs
        run: |
          . .venv/bin/activate
          if [[ "${{ steps.preview.outputs.is_preview }}" == "true" ]]; then
            SCPY_BUILDDIR=${{ steps.preview.outputs.build_subdir }} \
              python3 docs/make.py -j1 html
          else
            python3 docs/make.py -j1 html
          fi

      # ---------- build oldest version (stable only) ----------
      - name: Build oldest version of the documentation
        if: steps.preview.outputs.is_preview != 'true'
        run: |
          . .venv/bin/activate
          if [ ! -d build/html/0.6.10 ]; then
            echo "Recreating oldest docs"
            python3 docs/make.py -j1 html -T 0.6.10
          fi

      # ---------- install branch preview into gh-pages clone ----------
      - name: Install branch preview into gh-pages
        if: steps.preview.outputs.is_preview == 'true'
        run: |
          PREVIEW_PATH="${{ steps.preview.outputs.preview_path }}"
          # The preview build output is in build_subdir/html/ after make.py post-build
          mkdir -p "build/html/$PREVIEW_PATH"
          cp -a "build/branch_preview/html/." "build/html/$PREVIEW_PATH/"
          echo "Branch preview installed under build/html/$PREVIEW_PATH/"

      # ---------- upload artifacts ----------
      - name: Determine artifact name
        id: artifact
        run: |
          if [[ "${{ steps.preview.outputs.is_preview }}" == "true" ]]; then
            echo "name=docs-preview-${{ steps.preview.outputs.preview_path }}" >> "$GITHUB_OUTPUT"
            echo "path=build/branch_preview/html/" >> "$GITHUB_OUTPUT"
            echo "retention=3" >> "$GITHUB_OUTPUT"
          else
            echo "name=docs" >> "$GITHUB_OUTPUT"
            echo "path=build/html/" >> "$GITHUB_OUTPUT"
            echo "retention=5" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: ${{ steps.artifact.outputs.retention }}

      # ---------- deploy to gh-pages ----------
      - name: Deployment
        if: (github.event_name != 'pull_request' && !github.event.act)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/html/
          single-commit: true
          repository-name: ${{ github.repository }}
