# This workflow builds and publishes the documentation for SpectrochemPy
# Documentation is built using Sphinx and published to GitHub Pages
#
# Branch preview deployment:
# - Development branches (non-master, non-docs/*, non-release) publish
#   preview docs under /<branch-name>/ on GitHub Pages.
# - Branch names are sanitised: "/" becomes "-".
# - Example: branch "feature/new-nmr" → /feature-new-nmr/
# - Stable docs at root level remain untouched.
# - Preview docs are automatically removed when the branch is deleted
#   via the cleanup workflow (cleanup_branch_docs.yml).

name: Docs 📕

on:
  push:
    branches:
      - "**"

  pull_request:

  release:
    types: [published]

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * 0"  # At 00:00 on Sunday

permissions:
  contents: write  # Required for pushing to gh-pages
  actions: read    # Default permission for actions
  id-token: none   # Explicitly disable id-token unless needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_publish_documentation:
    # Only run scheduled jobs on main repository.
    # For pull_request events, skip if the PR is from the same repository
    # (push events on the branch already trigger the workflow).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.repository == 'spectrochempy/spectrochempy' &&
        (
          (github.event_name == 'schedule') ||
          (github.event_name != 'schedule' &&
           (github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name != github.repository))
        )
      )

    name: Build and publish documentation
    runs-on: ubuntu-latest
    env:
      TZ: "Etc/UTC"

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Initialize CI diagnostics
        run: |
          echo "CI_TIMING_FILE=$RUNNER_TEMP/ci-timings.txt" >> "$GITHUB_ENV"
          : > "$RUNNER_TEMP/ci-timings.txt"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: |
          set -e
          start=$SECONDS
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          duration=$((SECONDS - start))
          echo "environment creation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Install uv and verify installation
        run: |
          set -e
          . .venv/bin/activate
          start=$SECONDS
          python -m pip install --upgrade pip
          python -m pip install --upgrade uv
          which uv
          uv --version
          duration=$((SECONDS - start))
          echo "uv installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Install spectrochempy
        run: |
          set -e
          . .venv/bin/activate
          start=$SECONDS
          uv pip install -e ".[docs]"
          duration=$((SECONDS - start))
          echo "dependency installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Install SpectroChemPy plugins
        run: |
          set -e
          . .venv/bin/activate
          start=$SECONDS
          uv pip install --no-deps -e plugins/spectrochempy-nmr
          uv pip install --no-deps -e plugins/spectrochempy-iris
          uv pip install --no-deps -e plugins/spectrochempy-hypercomplex
          # Install plugin runtime dependencies that --no-deps skips
          uv pip install osqp scipy numpy-quaternion
          duration=$((SECONDS - start))
          echo "plugin installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Environment and plugin diagnostics
        run: |
          . .venv/bin/activate
          python .github/workflows/scripts/ci_diagnostics.py environment

      - name: Verify local checkout and version
        run: |
          set -e
          . .venv/bin/activate
          python -c "
          import spectrochempy as scp
          print(f'scp.__version__ = {scp.__version__}')
          print(f'scp.__file__   = {scp.__file__}')
          assert 'site-packages/spectrochempy' not in scp.__file__, \
              f'FAIL: spectrochempy resolved from site-packages instead of local checkout:\n  {scp.__file__}'
          print('OK: local editable checkout is active')
          # Reject stale hardcoded version that would produce wrong doc header
          stale = '0.9.1.dev0'
          assert stale not in scp.__version__, \
              f'FAIL: version {scp.__version__} contains stale hardcoded value {stale!r} -- setuptools_scm did not compute version from git tags'
          print(f'OK: version {scp.__version__} is computed from git tags')
          "

      - name: Install Pandoc
        run: |
          set -e
          start=$SECONDS
          sudo apt-get update
          sudo apt-get install -y pandoc
          pandoc --version
          duration=$((SECONDS - start))
          echo "pandoc installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Setup Jupyter kernel
        if: github.event_name != 'pull_request'
        run: |
          set -e
          . .venv/bin/activate
          start=$SECONDS
          uv pip install ipykernel
          python3 -m ipykernel install --user --name python3 --display-name "Python 3"
          duration=$((SECONDS - start))
          echo "jupyter kernel setup: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Set up version environment variable
        run: |
          . .venv/bin/activate
          python3 .github/workflows/scripts/set_env_var.py

      # ---------- preview / stable branch detection ----------
      - name: Determine preview parameters
        id: preview
        run: |
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          # Stable builds: master, docs/* branches, and release events
          if [[ "$BRANCH" == "master" || "$BRANCH" == docs/* || "$EVENT" == "release" ]]; then
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
            echo "preview_path=" >> "$GITHUB_OUTPUT"
            echo "build_subdir=" >> "$GITHUB_OUTPUT"
          else
            SANITIZED=$(echo "$BRANCH" | tr '/' '-')
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
            echo "preview_path=$SANITIZED" >> "$GITHUB_OUTPUT"
            echo "build_subdir=build/branch_preview" >> "$GITHUB_OUTPUT"
          fi

      # ---------- restore reusable Sphinx/Sphinx-Gallery outputs for previews ----------
      - name: Restore documentation build cache
        if: steps.preview.outputs.is_preview == 'true'
        uses: actions/cache@v5
        with:
          path: |
            build/branch_preview/~doctrees
            docs/sources/gettingstarted/examples/gallery
          key: >-
            ${{ runner.os }}-docs-${{ steps.preview.outputs.preview_path }}-${{ hashFiles('pyproject.toml', 'docs/conf.py', 'docs/make.py', 'docs/sources/**/*.rst', 'docs/sources/**/*.py', 'docs/sources/**/*.ipynb', 'src/spectrochempy/examples/**/*.py', 'plugins/**/examples/**/*.py', 'plugins/**/examples/gallery.toml') }}
          restore-keys: |
            ${{ runner.os }}-docs-${{ steps.preview.outputs.preview_path }}-
            ${{ runner.os }}-docs-

      # ---------- clone gh-pages (preserve existing content) ----------
      - name: Clone gh-pages branch
        run: |
          mkdir -p build
          git clone --branch=gh-pages --single-branch \
            https://github.com/${{ github.repository }}.git build/html

      # ---------- build docs ----------
      - name: Build docs
        run: |
          set -e
          . .venv/bin/activate
          start=$SECONDS
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ steps.preview.outputs.is_preview }}" == "true" ]]; then
            SCPY_BUILDDIR=${{ steps.preview.outputs.build_subdir }} \
              python3 docs/make.py --no-exec -j auto html
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            python3 docs/make.py --no-exec -j auto html
          elif [[ "${{ steps.preview.outputs.is_preview }}" == "true" ]]; then
            SCPY_BUILDDIR=${{ steps.preview.outputs.build_subdir }} \
              python3 docs/make.py -j auto html
          else
            python3 docs/make.py -j auto html
          fi
          duration=$((SECONDS - start))
          echo "documentation build: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: CI diagnostics summary
        if: ${{ always() }}
        run: |
          if [ -f .venv/bin/activate ]; then
            . .venv/bin/activate
          fi
          python .github/workflows/scripts/ci_diagnostics.py summary \
            --timings "${CI_TIMING_FILE:-}"

      # ---------- build oldest version (stable only) ----------
      - name: Build oldest version of the documentation
        if: steps.preview.outputs.is_preview != 'true'
        run: |
          . .venv/bin/activate
          if [ ! -d build/html/0.6.10 ]; then
            echo "Recreating oldest docs"
            python3 docs/make.py -j1 html -T 0.6.10
          fi

      # ---------- build missing stable versions for dropdown ----------
      - name: Build missing stable versions
        if: steps.preview.outputs.is_preview != 'true'
        run: |
          . .venv/bin/activate
          # Iterate over all core release tags (spectrochempy-vX.Y.Z),
          # excluding plugin tags (spectrochempy-*-vX.Y.Z).
          for tag in $(git tag --list 'spectrochempy-v*' | sort -V); do
            version="${tag#spectrochempy-v}"
            # Build docs for this version if not already present
            if [ ! -d "build/html/$version" ]; then
              echo "Building v$version docs"
              python3 docs/make.py -j1 html -T "$tag"
            fi
          done

      # ---------- install branch preview into gh-pages clone ----------
      - name: Install branch preview into gh-pages
        if: steps.preview.outputs.is_preview == 'true'
        run: |
          PREVIEW_PATH="${{ steps.preview.outputs.preview_path }}"
          # The preview build output is in build_subdir/html/ after make.py post-build
          rm -rf "build/html/$PREVIEW_PATH"
          mkdir -p "build/html/$PREVIEW_PATH"
          cp -a "build/branch_preview/html/." "build/html/$PREVIEW_PATH/"
          echo "Branch preview installed under build/html/$PREVIEW_PATH/"

      # ---------- upload artifacts ----------
      - name: Determine artifact name
        id: artifact
        run: |
          if [[ "${{ steps.preview.outputs.is_preview }}" == "true" ]]; then
            echo "name=docs-preview-${{ steps.preview.outputs.preview_path }}" >> "$GITHUB_OUTPUT"
            echo "path=build/branch_preview/html/" >> "$GITHUB_OUTPUT"
            echo "retention=3" >> "$GITHUB_OUTPUT"
          else
            echo "name=docs" >> "$GITHUB_OUTPUT"
            echo "path=build/html/" >> "$GITHUB_OUTPUT"
            echo "retention=5" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: ${{ steps.artifact.outputs.retention }}

      # ---------- deploy to gh-pages ----------
      - name: Deployment
        if: (github.event_name != 'pull_request' && !github.event.act)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/html/
          single-commit: true
          repository-name: ${{ github.repository }}
