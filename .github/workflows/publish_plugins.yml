# This workflow builds and publishes SpectroChemPy plugin packages to:
# - TestPyPI on pushes to test branches
# - PyPI on published releases
#
# It discovers plugins automatically by scanning the plugins/ directory
# for directories containing a pyproject.toml file.
# Official plugins should also include a recipe.yaml (or meta.yaml) in their
# root so that build_package.yml can build the corresponding conda package.
#
# Release policy:
#   - Official plugins are released independently from the core package.
#   - Plugin releases are triggered by GitHub releases whose tag matches the
#     plugin name, e.g.  spectrochempy-nmr-v0.1.1
#   - A core release tag (e.g. spectrochempy-v0.8.3) does NOT publish plugins.
#   - plugin-template is excluded from discovery — it is a developer scaffold.
#   - PyPI upload uses skip-existing so an already-published version never
#     causes a hard failure.
#   - Conda upload uses --force only on the dev label; stable (main) uploads
#     fail cleanly if the version already exists.

name: Publish plugin packages

on:
  push:
    branches:
      - test/plugin-publish-workflow
    paths:
      - ".github/workflows/publish_plugins.yml"
      - "plugins/**"

  pull_request:
    paths:
      - ".github/workflows/publish_plugins.yml"
      - "plugins/**"

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      publish_to:
        description: "Package index to publish to"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - none

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-plugins:
    name: Discover official plugins
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set plugin matrix
        id: set-matrix
        run: |
          # Official plugins are explicitly listed. Experimental plugins may live in
          # the repository but are NOT auto-published by this workflow.
          OFFICIAL_PLUGINS="spectrochempy-nmr spectrochempy-iris spectrochempy-hypercomplex spectrochempy-carroucell"

          plugins=()
          for dir in plugins/*/; do
            name=$(basename "$dir")
            if [ "$name" = "plugin-template" ]; then
              echo "Skipping $name (developer template, not publishable)"
              continue
            fi
            if ! echo "$OFFICIAL_PLUGINS" | grep -qw "$name"; then
              echo "Skipping $name (not in official plugin allowlist)"
              continue
            fi
            if [ -f "${dir}pyproject.toml" ]; then
              plugins+=("{\"name\":\"$name\",\"path\":\"$dir\"}")
            fi
          done

          if [ ${#plugins[@]} -eq 0 ]; then
            echo "::error::No official plugins discovered in plugins/"
            exit 1
          fi

          # Join with commas and wrap in JSON array
          joined=$(IFS=,; echo "${plugins[*]}")
          echo "matrix={\"plugin\":[$joined]}" >> "$GITHUB_OUTPUT"
          echo "Discovered official plugins: $joined"

  build-and-publish_plugins:
    name: Build and publish plugin distributions
    runs-on: ubuntu-latest
    needs: discover-plugins

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-plugins.outputs.matrix) }}

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pypa/build
        run: |
          python -m pip install build --user

      - name: Build plugin source and wheel distributions
        run: |
          python -m build --sdist --wheel --outdir dist/${{ matrix.plugin.name }} ${{ matrix.plugin.path }}

      - name: Upload plugin build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: pypi-package-${{ matrix.plugin.name }}
          path: |
            dist/${{ matrix.plugin.name }}/*.whl
            dist/${{ matrix.plugin.name }}/*.tar.gz
          retention-days: 5

      - name: Publish plugin package to TestPyPI
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.publish_to == 'testpypi')
          )
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/${{ matrix.plugin.name }}
          skip-existing: true

      - name: Publish plugin package to PyPI
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          github.event_name == 'release' &&
          github.event.action == 'published' &&
          startsWith(github.ref_name, matrix.plugin.name)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/${{ matrix.plugin.name }}
          skip-existing: true
