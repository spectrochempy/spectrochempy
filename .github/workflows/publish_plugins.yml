# This workflow builds and publishes SpectroChemPy plugin packages to:
# - TestPyPI on pushes to test branches
# - PyPI on published releases
#
# Official plugins are identified by the "Framework :: SpectroChemPy :: Official Plugin"
# classifier in their pyproject.toml. Experimental plugins (e.g. spectrochempy-cantera)
# live in the repository but are NOT auto-published by this workflow — they must be
# published manually or through a separate publish workflow.
#
# Release policy:
#   - Official plugins are released independently from the core package.
#   - Plugin releases are triggered by GitHub releases whose tag matches the
#     plugin name, e.g.  spectrochempy-nmr-v0.1.1
#   - A core release tag (e.g. spectrochempy-v0.9.0) does NOT publish plugins.
#   - plugin-template is excluded from discovery — it is a developer scaffold.
#   - PyPI upload uses skip-existing so an already-published version never
#     causes a hard failure.
#   - Conda plugin publication is handled by build_package.yml.

name: Publish plugin packages

on:
  push:
    branches:
      - master
      - test/plugin-publish-workflow
    paths:
      - ".github/workflows/publish_plugins.yml"
      - ".github/workflows/scripts/plugin_version_status.py"
      - "plugins/**"

  pull_request:
    paths:
      - ".github/workflows/publish_plugins.yml"
      - ".github/workflows/scripts/plugin_version_status.py"
      - "plugins/**"

  release:
    types: [published]

  workflow_dispatch:
    inputs:
      publish_to:
        description: "Package index to publish to"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - none

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-plugins:
    name: Discover official plugins
    if: >
      github.repository == 'spectrochempy/spectrochempy' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set plugin matrix
        id: set-matrix
        run: |
          python3 -c "
          import json, tomllib, sys
          from pathlib import Path

          OFFICIAL = 'Framework :: SpectroChemPy :: Official Plugin'
          plugins = []
          for d in sorted(Path('plugins').glob('*/')):
              name = d.name
              if name == 'plugin-template':
                  print(f'Skipping {name} (developer template, not publishable)', file=sys.stderr)
                  continue
              pyproject = d / 'pyproject.toml'
              if not pyproject.is_file():
                  continue
              try:
                  data = tomllib.loads(pyproject.read_text())
                  classifiers = data.get('project', {}).get('classifiers', [])
                  if OFFICIAL not in classifiers:
                      print(f'Skipping {name} (no Official Plugin classifier)', file=sys.stderr)
                      continue
              except Exception:
                  continue
              plugins.append({'name': name, 'path': f'plugins/{name}'})

          if not plugins:
              print('::error::No official plugins discovered in plugins/')
              sys.exit(1)

          j = json.dumps({'plugin': plugins})
          print(f'matrix={j}')
          print(f'Discovered official plugins: {j}', file=sys.stderr)
          " >> "$GITHUB_OUTPUT"

  build-and-publish_plugins:
    name: Build and publish plugin distributions
    if: >
      github.repository == 'spectrochempy/spectrochempy' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: discover-plugins

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-plugins.outputs.matrix) }}

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pypa/build
        run: |
          python -m pip install build --user

      - name: Apply plugin development version
        id: plugin-version
        if: ${{ github.event_name != 'release' }}
        run: |
          python3 .github/workflows/scripts/plugin_version_status.py \
            --plugin "${{ matrix.plugin.name }}" \
            --apply-dev-version \
            --github-output \
            --json

      - name: Build plugin source and wheel distributions
        run: |
          python -m build --sdist --wheel --outdir dist/${{ matrix.plugin.name }} ${{ matrix.plugin.path }}

      - name: Upload plugin build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: pypi-package-${{ matrix.plugin.name }}
          path: |
            dist/${{ matrix.plugin.name }}/*.whl
            dist/${{ matrix.plugin.name }}/*.tar.gz
          retention-days: 5

      # Publishing currently uses API tokens rather than Trusted Publishing (OIDC),
      # as a temporary workaround for PyPI Trusted Publisher setup issues.
      - name: Publish plugin package to TestPyPI
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          steps.plugin-version.outputs.has_changes == 'true' &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.publish_to == 'testpypi')
          )
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/${{ matrix.plugin.name }}
          skip-existing: true
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish plugin package to PyPI
        if: |
          github.repository == 'spectrochempy/spectrochempy' &&
          github.event_name == 'release' &&
          github.event.action == 'published' &&
          startsWith(github.ref_name, matrix.plugin.name)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/${{ matrix.plugin.name }}
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Restore plugin version metadata
        if: ${{ always() && github.event_name != 'release' }}
        run: |
          git restore --worktree -- "${{ matrix.plugin.path }}"
          git diff --exit-code -- "${{ matrix.plugin.path }}"
