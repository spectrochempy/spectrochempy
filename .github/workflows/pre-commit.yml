name: Pre-commit 🔦

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  pre-commit:
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref }}-pre-commit
      cancel-in-progress: ${{github.event_name == 'pull_request'}}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Determine core version for pre-commit hooks
      run: |
        LATEST_CORE_TAG=$(git tag -l 'spectrochempy-v*' --sort=-v:refname | head -1)
        if [[ -z "$LATEST_CORE_TAG" ]]; then
          echo "::error::No core tag found — cannot determine core version"
          exit 1
        fi
        CORE_VERSION="${LATEST_CORE_TAG#spectrochempy-v}.dev0"
        echo "Using core version: $CORE_VERSION"
        echo "SETUPTOOLS_SCM_PRETEND_VERSION=$CORE_VERSION" >> "$GITHUB_ENV"
    - uses: pre-commit/action@v3.0.1
