# This workflow runs tests for SpectrochemPy across different operating systems and Python versions
# It ensures the package works correctly in various environments

name: Tests

# Define when this workflow should run:
# - On push to main branches
# - Weekly on Sunday at midnight
# - On pull requests
# - Manually from GitHub interface
on:
  push:
    branches:
      - master
      - develop
      - feature/*

  schedule:
    - cron: "0 0 * * 0"  # At 00:00 on Sunday

  pull_request:

  workflow_dispatch:  # Manual trigger

# Prevent multiple simultaneous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Required for actions/checkout
  id-token: write  # Required for certain authentication scenarios
  actions: read  # Default permissions for actions
  checks: write  # Required for reporting test results
  statuses: write  # Required for updating commit statuses

jobs:
  test-package:
    # Skip tests for releases and limit scheduled runs to main repository
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy'
       && !startsWith(github.ref, 'refs/release/')) || (
       github.event_name != 'schedule'
       && !startsWith(github.ref, 'refs/release/'))

    name: Test using ${{ matrix.os }} and python ${{ matrix.pythonVersion }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash {0}
        # do not use -l flag (do not work with macos when bash is se in login mode)

    # Define test matrix - this will run tests in parallel for:
    # - Different operating systems (Ubuntu, macOS, Windows)
    # - Different Python versions (3.10, 3.13)
    strategy:
      fail-fast: false  # Continue testing even if one combination fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pythonVersion: ["3.11", "3.14"]
        include:
          # Full testing on Ubuntu with all Python versions
          - os: ubuntu-latest
            pythonVersion: "3.11"
            full_test: true
          - os: ubuntu-latest
            pythonVersion: "3.14"
            full_test: true

          # Limited testing on Windows/macOS
          - os: windows-latest
            pythonVersion: "3.14"
            full_test: false
          - os: macos-latest
            pythonVersion: "3.14"
            full_test: false

        exclude:
          # Exclude other combinations
          - os: macos-latest
            pythonVersion: "3.11"
          - os: windows-latest
            pythonVersion: "3.11"

    steps:
      # Print debug information about the current run
      - name: info
        run: |
          echo "Environment Act: ${{ env.ACT }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "pythonVersion: ${{ matrix.pythonVersion }}"
          echo "os: ${{ matrix.os }}"

      - name: Checkout spectrochempy repository
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.pythonVersion }}
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pythonVersion }}
          cache: "pip"

      - name: Set UTF-8 encoding for Windows
        if: matrix.os == 'windows-latest'
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV
          echo "PYTHONUTF8=1" >> $GITHUB_ENV

      - name: Install spectrochempy
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python -m pip install ".[test]"
          # check the MPL setup
          python src/spectrochempy/data/setup.py

      - name: Test with coverage
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          coverage run --source=spectrochempy -m pytest tests -s --durations=10 --ignore=tests/test_docs

      - name: Debug info coverage content
        run: |
          coverage report -m

      - name: Debug info workflow completion
        run: |
          echo "Tests completed successfully"
          echo "Workflow name: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Current branch: ${{ github.ref }}"

      - name: Coverage report to xml
        if: ${{ !env.ACT &&  github.event_name == 'push' && matrix.pythonVersion == '3.14' && matrix.os == 'ubuntu-latest' }}
        run: |
          coverage xml

      - name: Upload coverage reports to Codecov
        if: ${{ !env.ACT &&  github.event_name == 'push' && matrix.pythonVersion == '3.14' && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-docs:
    name: Test documentation examples
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy'
       && !startsWith(github.ref, 'refs/release/')) || (
       github.event_name != 'schedule'
       && !startsWith(github.ref, 'refs/release/'))

    defaults:
      run:
        shell: bash {0}

    steps:
      - name: Checkout spectrochempy repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install spectrochempy with test dependencies
        run: |
          python -m pip install ".[test]"
          python src/spectrochempy/data/setup.py

      - name: Run documentation tests
        run: |
          python -m pytest tests/test_docs -s --durations=10

  test-plugin-nmr:
    name: Test NMR plugin
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy'
       && !startsWith(github.ref, 'refs/release/')) || (
       github.event_name != 'schedule'
       && !startsWith(github.ref, 'refs/release/'))

    defaults:
      run:
        shell: bash {0}

    steps:
      - name: Checkout spectrochempy repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install spectrochempy and NMR plugin
        run: |
          python -m pip install ".[test]" plugins/spectrochempy-nmr
          python src/spectrochempy/data/setup.py

      - name: Download test data
        run: |
          python -c "
          import spectrochempy as scp
          from spectrochempy.application.testdata import download_full_testdata_directory
          download_full_testdata_directory(scp.preferences.datadir)
          "

      - name: Run NMR plugin tests
        working-directory: plugins/spectrochempy-nmr
        run: |
          python -m pytest tests -v --durations=10

  test-plugin-iris:
    name: Test IRIS plugin
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy'
       && !startsWith(github.ref, 'refs/release/')) || (
       github.event_name != 'schedule'
       && !startsWith(github.ref, 'refs/release/'))

    defaults:
      run:
        shell: bash {0}

    steps:
      - name: Checkout spectrochempy repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install spectrochempy and IRIS plugin
        run: |
          python -m pip install ".[test]" plugins/spectrochempy-iris
          python src/spectrochempy/data/setup.py

      - name: Run IRIS plugin tests
        working-directory: plugins/spectrochempy-iris
        run: |
          python -m pytest tests -v --durations=10

  test-plugin-cantera:
    name: Test Cantera plugin
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy'
       && !startsWith(github.ref, 'refs/release/')) || (
       github.event_name != 'schedule'
       && !startsWith(github.ref, 'refs/release/'))

    defaults:
      run:
        shell: bash {0}

    steps:
      - name: Checkout spectrochempy repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install spectrochempy and Cantera plugin
        run: |
          python -m pip install ".[test]" plugins/spectrochempy-cantera
          python src/spectrochempy/data/setup.py

      - name: Run Cantera plugin tests
        working-directory: plugins/spectrochempy-cantera
        run: |
          python -m pytest tests -v --durations=10
