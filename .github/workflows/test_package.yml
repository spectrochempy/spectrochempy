# This workflow runs tests for SpectrochemPy across different operating systems and Python versions
# It ensures the package works correctly in various environments

name: Tests

# Define when this workflow should run:
# - On push to main branches
# - Weekly on Sunday at midnight
# - On pull requests
# - Manually from GitHub interface
on:
  push:
    branches:
      - master
      - develop
      - feature/*

  schedule:
    - cron: "0 0 * * 0"  # At 00:00 on Sunday

  pull_request:

  workflow_dispatch:  # Manual trigger

# Prevent multiple simultaneous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Required for actions/checkout
  id-token: write  # Required for certain authentication scenarios
  actions: read  # Default permissions for actions
  checks: write  # Required for reporting test results
  statuses: write  # Required for updating commit statuses

jobs:
  test-package:
    # Skip tests for releases and limit scheduled runs to main repository
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy'
       && !startsWith(github.ref, 'refs/release/')) || (
       github.event_name != 'schedule'
       && !startsWith(github.ref, 'refs/release/'))

    name: Test using ${{ matrix.os }} and python ${{ matrix.pythonVersion }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash {0}
        # do not use -l flag (do not work with macos when bash is se in login mode)

    # Define test matrix - this will run tests in parallel for:
    # - Different operating systems (Ubuntu, macOS, Windows)
    # - Different Python versions (3.10, 3.13)
    strategy:
      fail-fast: false  # Continue testing even if one combination fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pythonVersion: ["3.11", "3.14"]
        include:
          # Full testing on Ubuntu with all Python versions
          - os: ubuntu-latest
            pythonVersion: "3.11"
            full_test: true
          - os: ubuntu-latest
            pythonVersion: "3.14"
            full_test: true

          # Limited testing on Windows/macOS
          - os: windows-latest
            pythonVersion: "3.14"
            full_test: false
          - os: macos-latest
            pythonVersion: "3.14"
            full_test: false

        exclude:
          # Exclude other combinations
          - os: macos-latest
            pythonVersion: "3.11"
          - os: windows-latest
            pythonVersion: "3.11"

    steps:
      # Print debug information about the current run
      - name: info
        run: |
          echo "Environment Act: ${{ env.ACT }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "pythonVersion: ${{ matrix.pythonVersion }}"
          echo "os: ${{ matrix.os }}"

      - name: Initialize CI diagnostics
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          echo "CI_TIMING_FILE=$RUNNER_TEMP/ci-timings.txt" >> "$GITHUB_ENV"
          : > "$RUNNER_TEMP/ci-timings.txt"

      - name: Checkout spectrochempy repository
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.pythonVersion }}
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pythonVersion }}
          cache: "pip"

      - name: Set UTF-8 encoding for Windows
        if: matrix.os == 'windows-latest'
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV
          echo "PYTHONUTF8=1" >> $GITHUB_ENV

      - name: Restore test data and runtime caches
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.spectrochempy/testdata
            ~/.cache/matplotlib
            .pytest_cache
          key: >-
            ${{ runner.os }}-py${{ matrix.pythonVersion }}-test-runtime-${{ hashFiles('src/spectrochempy/application/testdata.py', 'tests/conftest.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.pythonVersion }}-test-runtime-
            ${{ runner.os }}-test-runtime-

      - name: Install spectrochempy
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          set -e
          start=$SECONDS
          python -m pip install ".[test]"
          # check the MPL setup
          python src/spectrochempy/data/setup.py
          duration=$((SECONDS - start))
          echo "dependency installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Install SpectroChemPy plugins
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          set -e
          start=$SECONDS
          python -m pip install -e plugins/spectrochempy-hypercomplex
          python -m pip install -e plugins/spectrochempy-nmr
          python -m pip install -e plugins/spectrochempy-iris
          python -m pip install -e plugins/spectrochempy-cantera
          python -m pip install -e plugins/spectrochempy-carroucell
          duration=$((SECONDS - start))
          echo "plugin installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Download test data
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          set -e
          start=$SECONDS
          python -c "
          import spectrochempy as scp
          from spectrochempy.application.testdata import download_full_testdata_directory
          datadir = scp.preferences.datadir
          print(f'Downloading test data to {datadir}...')
          download_full_testdata_directory(datadir, force=False)
          # Verify key NMR data is present (docs scripts need this)
          nmr_dir = datadir / 'nmrdata' / 'bruker' / 'tests' / 'nmr' / 'topspin_1d' / '1'
          required = ['acqu', 'acqus', 'fid']
          missing = [f for f in required if not (nmr_dir / f).exists()]
          if missing:
              print(f'NMR files missing: {missing}, forcing re-download...')
              download_full_testdata_directory(datadir, force=True)
              missing = [f for f in required if not (nmr_dir / f).exists()]
              if missing:
                  raise RuntimeError(f'Failed to download NMR files: {missing}')
          else:
              print('NMR test data verified.')
          # List NMR dir contents for debugging
          if nmr_dir.exists():
              print('NMR dir contents:', [p.name for p in nmr_dir.iterdir()])
          else:
              print('WARNING: NMR dir does not exist:', nmr_dir)
          print('Test data ready.')
          "
          duration=$((SECONDS - start))
          echo "test data download: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Environment and plugin diagnostics
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python .github/workflows/scripts/ci_diagnostics.py environment

      - name: Select pytest targets
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python .github/workflows/scripts/select_test_targets.py \
            --base "${{ github.event.pull_request.base.sha || github.event.before || '' }}" \
            --head "${{ github.sha }}" \
            --event-name "${{ github.event_name }}" \
            --ref-name "${{ github.ref_name }}" \
            --base-ref "${{ github.base_ref }}"

      - name: Test with coverage
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          set -o pipefail
          start=$SECONDS
          echo "pytest selection: ${SCPY_TEST_SELECTION:-full}"
          echo "pytest selection reason: ${SCPY_TEST_SELECTION_REASON:-not provided}"
          echo "pytest targets: ${SCPY_TEST_TARGETS:-tests}"
          coverage run --source=spectrochempy -m pytest ${SCPY_TEST_TARGETS:-tests} -s -ra --durations=10 | tee pytest.log
          status=${PIPESTATUS[0]}
          duration=$((SECONDS - start))
          echo "pytest execution: ${duration}s" | tee -a "$CI_TIMING_FILE"
          exit "$status"

      - name: CI diagnostics summary
        if: ${{ always() && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python .github/workflows/scripts/ci_diagnostics.py summary \
            --pytest-log pytest.log \
            --timings "$CI_TIMING_FILE"

      - name: Debug info coverage content
        if: ${{ always() && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          coverage report -m || echo "coverage report unavailable"

      - name: Debug info workflow completion
        if: ${{ always() }}
        run: |
          echo "Test workflow diagnostic step completed"
          echo "Workflow name: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Current branch: ${{ github.ref }}"

      - name: Coverage report to xml
        if: ${{ !env.ACT &&  github.event_name == 'push' && matrix.pythonVersion == '3.14' && matrix.os == 'ubuntu-latest' }}
        run: |
          coverage xml

      - name: Upload coverage reports to Codecov
        if: ${{ !env.ACT &&  github.event_name == 'push' && matrix.pythonVersion == '3.14' && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
