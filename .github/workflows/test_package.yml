# This workflow runs tests for SpectrochemPy across different operating systems and Python versions
# It ensures the package works correctly in various environments

name: Tests

# Define when this workflow should run:
# - On push to main branches
# - Weekly on Sunday at midnight
# - On pull requests
# - Manually from GitHub interface
on:
  push:
    branches:
      - master
      - develop
      - feature/*
      - chore/*
    paths-ignore:
      - 'docs/**'

  schedule:
    - cron: "0 0 * * 0"  # At 00:00 on Sunday

  pull_request:
    paths-ignore:
      - 'docs/**'

  workflow_dispatch:  # Manual trigger

# Prevent multiple simultaneous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # Required for actions/checkout
  id-token: write  # Required for certain authentication scenarios
  actions: read  # Default permissions for actions
  checks: write  # Required for reporting test results
  statuses: write  # Required for updating commit statuses

jobs:
  test-package:
    # Skip tests for releases and limit scheduled runs to main repository
    if: |
      (github.event_name == 'schedule'
       && github.repository == 'spectrochempy/spectrochempy'
       && !startsWith(github.ref, 'refs/release/')) || (
       github.event_name != 'schedule'
       && !startsWith(github.ref, 'refs/release/'))

    name: Test ${{ matrix.validation }} using ${{ matrix.os }} and python ${{ matrix.pythonVersion }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash {0}
        # do not use -l flag (do not work with macos when bash is se in login mode)

    # Run the complete instrumented suite once, then keep lightweight
    # compatibility coverage for the minimum Python and other operating systems.
    strategy:
      fail-fast: false  # Continue testing even if one combination fails
      matrix:
        include:
          - os: ubuntu-latest
            pythonVersion: "3.14"
            coverage: false
            docs_examples: false
            plugins: false
            core_only: true
            test_targets: tests/test_core/test_dataset tests/test_core/test_units tests/test_core/test_projects tests/test_core/test_scripts tests/test_core/test_plotters
            validation: core-only
          - os: ubuntu-latest
            pythonVersion: "3.14"
            coverage: true
            docs_examples: true
            plugins: true
            core_only: false
            test_targets: ""
            validation: integration
          - os: ubuntu-latest
            pythonVersion: "3.11"
            coverage: false
            docs_examples: false
            plugins: true
            core_only: false
            test_targets: ""
            validation: compatibility
          - os: windows-latest
            pythonVersion: "3.14"
            coverage: false
            docs_examples: false
            plugins: true
            core_only: false
            test_targets: ""
            validation: compatibility
          - os: macos-latest
            pythonVersion: "3.14"
            coverage: false
            docs_examples: false
            plugins: true
            core_only: false
            test_targets: ""
            validation: compatibility

    steps:
      # Print debug information about the current run
      - name: info
        run: |
          echo "Environment Act: ${{ env.ACT }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "pythonVersion: ${{ matrix.pythonVersion }}"
          echo "os: ${{ matrix.os }}"
          echo "core_only: ${{ matrix.core_only }}"
          echo "plugins: ${{ matrix.plugins }}"

      - name: Initialize CI diagnostics
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          echo "CI_TIMING_FILE=$RUNNER_TEMP/ci-timings.txt" >> "$GITHUB_ENV"
          : > "$RUNNER_TEMP/ci-timings.txt"

      - name: Checkout spectrochempy repository
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.pythonVersion }}
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pythonVersion }}
          cache: "pip"

      - name: Set UTF-8 encoding for Windows
        if: matrix.os == 'windows-latest'
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV
          echo "PYTHONUTF8=1" >> $GITHUB_ENV

      - name: Restore test data and runtime caches
        if: ${{ !matrix.core_only && !(env.ACT && matrix.pythonVersion == '3.14') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.spectrochempy/testdata
            ~/.cache/matplotlib
            .pytest_cache
          key: >-
            ${{ runner.os }}-py${{ matrix.pythonVersion }}-test-runtime-${{ hashFiles('src/spectrochempy/application/testdata.py', 'tests/conftest.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.pythonVersion }}-test-runtime-
            ${{ runner.os }}-test-runtime-

      - name: Install spectrochempy
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: 0.9.1.dev0
        run: |
          set -e
          start=$SECONDS
          python -m pip install ".[test]"
          # check the MPL setup
          python src/spectrochempy/data/setup.py
          duration=$((SECONDS - start))
          echo "dependency installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Install SpectroChemPy plugins
        if: ${{ matrix.plugins && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          set -e
          start=$SECONDS
          python -m pip install -e plugins/spectrochempy-hypercomplex
          python -m pip install -e plugins/spectrochempy-nmr
          python -m pip install -e plugins/spectrochempy-iris
          python -m pip install -e plugins/spectrochempy-carroucell
          duration=$((SECONDS - start))
          echo "plugin installation: ${duration}s" | tee -a "$CI_TIMING_FILE"

      - name: Environment and plugin diagnostics
        if: ${{ matrix.plugins && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python .github/workflows/scripts/ci_diagnostics.py environment

      - name: Core-only environment diagnostics
        if: ${{ matrix.core_only && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python - <<'PY'
          from importlib import metadata
          from importlib.util import find_spec

          official_plugins = [
              "spectrochempy-hypercomplex",
              "spectrochempy-nmr",
              "spectrochempy-iris",
              "spectrochempy-carroucell",
          ]
          import_names = {
              "spectrochempy-hypercomplex": "spectrochempy_hypercomplex",
              "spectrochempy-nmr": "spectrochempy_nmr",
              "spectrochempy-iris": "spectrochempy_iris",
              "spectrochempy-carroucell": "spectrochempy_carroucell",
          }

          installed = []
          importable = []
          for package in official_plugins:
              try:
                  metadata.version(package)
              except metadata.PackageNotFoundError:
                  pass
              else:
                  installed.append(package)
              if find_spec(import_names[package]) is not None:
                  importable.append(import_names[package])

          if installed or importable:
              raise SystemExit(
                  "core-only job found official plugins installed/importable: "
                  f"installed={installed}, importable={importable}"
              )
          print("core-only plugin check: no official plugins installed/importable")
          PY

      - name: Select pytest targets
        if: ${{ !matrix.core_only && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python .github/workflows/scripts/select_test_targets.py \
            --base "${{ github.event.pull_request.base.sha || github.event.before || '' }}" \
            --head "${{ github.sha }}" \
            --event-name "${{ github.event_name }}" \
            --ref-name "${{ github.ref_name }}" \
            --base-ref "${{ github.base_ref }}"

      - name: Test package
        if: ${{ !(env.ACT && matrix.pythonVersion == '3.14') }}
        env:
          MPLBACKEND: Agg
        run: |
          set -o pipefail
          start=$SECONDS
          echo "pytest selection: ${SCPY_TEST_SELECTION:-full}"
          echo "pytest selection reason: ${SCPY_TEST_SELECTION_REASON:-not provided}"
          echo "pytest targets: ${SCPY_TEST_TARGETS:-${{ matrix.test_targets || 'tests' }}}"
          targets="${SCPY_TEST_TARGETS:-${{ matrix.test_targets || 'tests' }}}"
          pytest_extra_args=()
          if [[ "${{ matrix.docs_examples }}" != "true" ]]; then
            pytest_extra_args+=(--ignore=tests/test_docs/test_py_in_docs.py)
            echo "documentation scripts: omitted in this job"
          fi
          if [[ "${{ matrix.core_only }}" == "true" ]]; then
            pytest_extra_args+=(-m "not network and not data")
            echo "core-only markers: excluding network and data tests"
          fi
          if [[ "${{ matrix.docs_examples }}" != "true" && "$targets" == "tests/test_docs" ]]; then
            echo "documentation-only selection is covered by the canonical Ubuntu job and docs workflow" | tee pytest.log
            duration=$((SECONDS - start))
            echo "pytest execution: ${duration}s" | tee -a "$CI_TIMING_FILE"
            exit 0
          fi
          pytest_xdist_args=("${pytest_extra_args[@]}")
          pytest_capture_args=(-s)
          serial_pytest_args=("${pytest_extra_args[@]}")
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pytest_xdist_args+=(-n auto -m "not serial")
            serial_pytest_args+=(-m serial)
            pytest_capture_args=()
            echo "pytest-xdist: enabled for pull request validation"
          fi
          run_tests() {
            local pytest_args=("$@")
            local target
            local target_status=0
            for target in $targets; do
              echo "pytest target: $target"
              if [[ "${{ matrix.coverage }}" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
                coverage run --append --source=spectrochempy -m pytest "$target" "${pytest_args[@]}" "${pytest_capture_args[@]}" -ra --durations=10
              else
                python -m pytest "$target" "${pytest_args[@]}" "${pytest_capture_args[@]}" -ra --durations=10
              fi
              target_status=$?
              if [[ "$target_status" != "0" && "$target_status" != "5" ]]; then
                return "$target_status"
              fi
            done
            return 0
          }
          run_tests "${pytest_xdist_args[@]}" | tee pytest.log
          status=${PIPESTATUS[0]}
          if [[ "$status" == "0" && "${{ github.event_name }}" == "pull_request" ]]; then
            echo "pytest serial tests: enabled for tests marked serial" | tee -a pytest.log
            python -m pytest $targets "${serial_pytest_args[@]}" -s -ra --durations=10 | tee -a pytest.log
            serial_status=${PIPESTATUS[0]}
            if [[ "$serial_status" != "0" && "$serial_status" != "5" ]]; then
              status=$serial_status
            fi
          fi
          duration=$((SECONDS - start))
          echo "pytest execution: ${duration}s" | tee -a "$CI_TIMING_FILE"
          exit "$status"

      - name: CI diagnostics summary
        if: ${{ always() && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          python .github/workflows/scripts/ci_diagnostics.py summary \
            --pytest-log pytest.log \
            --timings "$CI_TIMING_FILE"

      - name: Debug info coverage content
        if: ${{ always() && matrix.coverage && github.event_name != 'pull_request' && !(env.ACT && matrix.pythonVersion == '3.14') }}
        run: |
          coverage report -m || echo "coverage report unavailable"

      - name: Debug info workflow completion
        if: ${{ always() }}
        run: |
          echo "Test workflow diagnostic step completed"
          echo "Workflow name: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Current branch: ${{ github.ref }}"

      - name: Coverage report to xml
        if: ${{ !env.ACT && github.event_name == 'push' && matrix.coverage && matrix.pythonVersion == '3.14' && matrix.os == 'ubuntu-latest' }}
        run: |
          coverage xml

      - name: Upload coverage reports to Codecov
        if: ${{ !env.ACT && github.event_name == 'push' && matrix.coverage && matrix.pythonVersion == '3.14' && matrix.os == 'ubuntu-latest' }}
        continue-on-error: ${{ github.repository != 'spectrochempy/spectrochempy' }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
