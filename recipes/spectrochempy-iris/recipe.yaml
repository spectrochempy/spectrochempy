context:
  name: spectrochempy-iris
  version: "0.1.0"

package:
  name: "${{ context.name }}"
  version: "${{ context.version }}"

source:
  path: ../../plugins/spectrochempy-iris

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=64
  run:
    - python >=3.11
    - spectrochempy >=0.8,<0.10
    - scipy
    - osqp

tests:
  - python:
      imports:
        - spectrochempy_iris
      pip_check: true

about:
  summary: "IRIS analysis extension for SpectroChemPy"
  description: |
    Official SpectroChemPy plugin providing IRIS (Impulse Response Inverse
    Solver) analysis, kernel matrix operations, and batch IRIS processing
    for spectroscopic datasets.
  homepage: https://www.spectrochempy.fr
  license: CeCILL-B
  repository: https://github.com/spectrochempy/spectrochempy

extra:
  recipe-maintainers:
    - fernandezc
    - atravert
