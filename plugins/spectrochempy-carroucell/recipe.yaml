context:
  name: spectrochempy-carroucell
  version: "0.1.0"

package:
  name: "${{ name }}"
  version: "${{ version }}"

source:
  path: ../../plugins/spectrochempy-carroucell

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=64
  run:
    - python >=3.11
    - spectrochempy >=0.9.0.dev0,<0.10
    - xlrd
    - scipy

tests:
  - script:
      - python -c "import importlib.util; assert importlib.util.find_spec('spectrochempy_carroucell') is not None"

about:
  summary: "Carroucell experiment reader for SpectroChemPy"
  description: |
    Official SpectroChemPy plugin providing the Carroucell experiment reader
    for spectroscopic data analysis.
  homepage: https://www.spectrochempy.fr
  license: LicenseRef-CeCILL-B
  repository: https://github.com/spectrochempy/spectrochempy

extra:
  recipe-maintainers:
    - fernandezc
    - atravert
