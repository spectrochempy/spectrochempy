context:
  name: spectrochempy-hypercomplex
  version: "0.1.0"

package:
  name: "${{ name }}"
  version: "${{ version }}"

source:
  path: ../../plugins/spectrochempy-hypercomplex

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=64
  run:
    - python >=3.11
    - spectrochempy >=0.9.0.dev0,<0.10
    - numpy
    - quaternion >=2024.0.7

tests:
  - script:
      - python -c "import importlib.util; assert importlib.util.find_spec('spectrochempy_hypercomplex') is not None"

about:
  summary: "Hypercomplex / quaternion support plugin for SpectroChemPy"
  description: |
    Official SpectroChemPy plugin providing quaternion dtype support,
    hypercomplex dataset accessors (dataset.hyper.RR), and NDMath
    overrides for quaternion data operations.
  homepage: https://www.spectrochempy.fr
  license: LicenseRef-CeCILL-B
  repository: https://github.com/spectrochempy/spectrochempy

extra:
  recipe-maintainers:
    - fernandezc
    - atravert
