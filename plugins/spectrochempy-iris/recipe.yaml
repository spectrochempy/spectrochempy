context:
  name: spectrochempy-iris
  version: "0.1.1"

package:
  name: "${{ name }}"
  version: "${{ version }}"

source:
  path: ../../plugins/spectrochempy-iris

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=64
  run:
    - python >=3.11
    - spectrochempy >=0.9.0.dev0,<0.10
    - scipy
    - osqp

tests:
  - script:
      - python -c "import importlib.util; assert importlib.util.find_spec('spectrochempy_iris') is not None"

about:
  summary: "IRIS analysis extension for SpectroChemPy"
  description: |
    Official SpectroChemPy plugin providing IRIS (Impulse Response Inverse
    Solver) analysis, kernel matrix operations, and batch IRIS processing
    for spectroscopic datasets.
  homepage: https://www.spectrochempy.fr
  license: LicenseRef-CeCILL-B
  repository: https://github.com/spectrochempy/spectrochempy

extra:
  recipe-maintainers:
    - fernandezc
    - atravert
