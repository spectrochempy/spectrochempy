context:
  name: spectrochempy-cantera
  version: "0.1.0"

package:
  name: "${{ name }}"
  version: "${{ version }}"

source:
  path: ../../plugins/spectrochempy-cantera

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=64
  run:
    - python >=3.11
    - spectrochempy >=0.9.0.dev0,<0.10
    - cantera >=3.0
    - numpy
    - scipy

tests:
  - script:
      - python -c "import importlib.util; assert importlib.util.find_spec('spectrochempy_cantera') is not None"

about:
  summary: "Cantera-based thermodynamics and reactive chemistry for SpectroChemPy"
  description: |
    Experimental SpectroChemPy plugin providing Cantera-based reactor simulations,
    chemical equilibrium calculations, and thermodynamic property lookups
    for spectroscopic data analysis. This plugin is not officially supported,
    the API may change without notice, and manual installation is required.
  homepage: https://www.spectrochempy.fr
  license: LicenseRef-CeCILL-B
  repository: https://github.com/spectrochempy/spectrochempy

extra:
  recipe-maintainers:
    - fernandezc
    - atravert
