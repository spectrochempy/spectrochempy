context:
  name: spectrochempy-cantera
  version: "0.1.0"

package:
  name: "${{ name }}"
  version: "${{ version }}"

source:
  path: ../../plugins/spectrochempy-cantera

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=64
  run:
    - python >=3.11
    - spectrochempy >=0.8,<0.10
    - cantera >=3.0
    - numpy
    - scipy

tests:
  - python:
      imports:
        - spectrochempy_cantera
      pip_check: true

about:
  summary: "Cantera-based thermodynamics and reactive chemistry for SpectroChemPy"
  description: |
    Official SpectroChemPy plugin providing Cantera-based reactor simulations,
    chemical equilibrium calculations, and thermodynamic property lookups
    for spectroscopic data analysis.
  homepage: https://www.spectrochempy.fr
  license: LicenseRef-CeCILL-B
  repository: https://github.com/spectrochempy/spectrochempy

extra:
  recipe-maintainers:
    - fernandezc
    - atravert
