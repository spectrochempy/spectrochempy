codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        informational: true
    patch:
      default:
        target: 70%
        threshold: 10%
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
